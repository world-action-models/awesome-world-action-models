<svg xmlns="http://www.w3.org/2000/svg" width="36" height="20" role="img" aria-label="PDF">
  <title>PDF</title>
  <linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
  <clipPath id="r"><rect width="36" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="36" height="20" fill="#b31b1b"/>
    <rect width="36" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,DejaVu Sans,Geneva,sans-serif" font-size="110" transform="scale(.1)">
    <text x="180" y="150" fill="#010101" fill-opacity=".3">PDF</text>
    <text x="180" y="140">PDF</text>
  </g>
</svg>
